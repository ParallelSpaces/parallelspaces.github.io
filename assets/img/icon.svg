<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Parallel Spaces app icon">
  <defs>
    <linearGradient id="ps-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#d99cf3"/>
      <stop offset="0.45" stop-color="#9c5bd9"/>
      <stop offset="1"    stop-color="#5a2ea0"/>
    </linearGradient>
    <linearGradient id="ps-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="230" fill="url(#ps-bg)"/>
  <rect width="1024" height="1024" rx="230" fill="url(#ps-sheen)"/>

  <!-- Left tall window -->
  <rect x="148" y="200" width="380" height="624" rx="42" fill="#ffffff" opacity="0.95"/>
  <circle cx="200" cy="248" r="14" fill="#ff5f57"/>
  <circle cx="240" cy="248" r="14" fill="#febc2e"/>
  <circle cx="280" cy="248" r="14" fill="#28c840"/>

  <!-- Top-right window -->
  <rect x="552" y="200" width="324" height="284" rx="42" fill="#ffffff" opacity="0.95"/>
  <circle cx="604" cy="248" r="14" fill="#ff5f57"/>
  <circle cx="644" cy="248" r="14" fill="#febc2e"/>
  <circle cx="684" cy="248" r="14" fill="#28c840"/>

  <!-- Bottom-right window -->
  <rect x="552" y="540" width="324" height="284" rx="42" fill="#ffffff" opacity="0.95"/>
  <circle cx="604" cy="588" r="14" fill="#ff5f57"/>
  <circle cx="644" cy="588" r="14" fill="#febc2e"/>
  <circle cx="684" cy="588" r="14" fill="#28c840"/>
</svg>
